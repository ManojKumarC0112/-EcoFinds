<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFinds - Your Cart</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --eco-green: #059669; --bg: #f9fafb; --surface: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); padding-top: 90px; }
        
        .navbar { background: rgba(255, 255, 255, 0.9)!important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .navbar-brand { font-weight: 700; color: var(--eco-green) !important; font-size: 1.5rem; }
        
        .cart-item-card { background: var(--surface); border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; overflow: hidden; }
        .cart-item-img { width: 120px; height: 120px; object-fit: cover; }
        
        .summary-card { background: var(--surface); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: sticky; top: 110px; }
        
        .co2-banner { background: linear-gradient(135deg, rgba(5,150,105,0.1), rgba(16,185,129,0.05)); border: 1px dashed rgba(5,150,105,0.4); border-radius: 16px; padding: 15px; text-align: center; }
        
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-arrow-left me-2 text-dark fs-4"></i> <span class="d-none d-md-inline text-dark fs-5 fw-medium">Continue Shopping</span>
            </a>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="fw-bold mb-4">Your Eco Cart</h2>

        <div class="row g-4 d-none" id="cartContent">
            <div class="col-lg-8" id="cartItemsList">
                <!-- Cart items load here -->
            </div>
            
            <div class="col-lg-4">
                <div class="summary-card border-0">
                    <h5 class="fw-bold mb-4">Summary</h5>
                    
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Items (<span id="itemCount">0</span>)</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    
                    <div class="co2-banner mb-4">
                        <i class="bi bi-tree-fill text-success fs-4 mb-2 d-block"></i>
                        <span class="text-dark fw-medium small d-block">This order will save approx.</span>
                        <h4 class="text-success fw-bold my-1" id="co2Total">0 kg CO₂</h4>
                    </div>

                    <hr class="mb-4 opacity-10">

                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5 fw-bold">Total</span>
                        <span class="fs-4 fw-bold text-dark" id="total">$0.00</span>
                    </div>
                    
                    <button class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm" id="btnCheckout" onclick="proceedToCheckout()">
                        Secure Checkout <i class="bi bi-lock-fill ms-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="emptyCart" class="text-center py-5 d-none">
            <div class="d-flex justify-content-center mb-4">
                <div class="bg-white p-4 rounded-circle shadow-sm">
                    <i class="bi bi-cart-x text-muted" style="font-size: 4rem;"></i>
                </div>
            </div>
            <h3 class="fw-bold text-dark mb-3">Your cart is empty</h3>
            <p class="text-muted mb-4">Looks like you haven't added any sustainable treasures yet.</p>
            <a href="index.html" class="btn btn-dark rounded-pill px-5 py-3 fw-bold shadow">Start Exploring</a>
        </div>
        
        <div id="loadingCart" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        if (!getCurrentUser()) {
            window.location.href = 'auth.html';
        }

        async function loadCart() {
            try {
                // Secure call implicitly uses JWT
                const data = await apiCall('/cart/');
                document.getElementById('loadingCart').classList.add('d-none');
                
                if (data.results.length === 0) {
                    document.getElementById('emptyCart').classList.remove('d-none');
                    document.getElementById('cartContent').classList.add('d-none');
                    return;
                }

                document.getElementById('emptyCart').classList.add('d-none');
                document.getElementById('cartContent').classList.remove('d-none');
                
                let subtotal = 0;
                let co2Total = 0;

                const itemsList = document.getElementById('cartItemsList');
                itemsList.innerHTML = data.results.map(item => {
                    subtotal += item.price;
                    // Mock CO2 for display if backend didn't join it into cart results
                    // My cart endpoint returns title, price, image. Let's assume 15kg for UI
                    const itemCo2 = 15; 
                    co2Total += itemCo2;

                    return `
                    <div class="cart-item-card d-flex flex-column flex-md-row position-relative" id="item-${item.cart_item_id}">
                        <img src="${item.image_url}" class="cart-item-img" alt="${item.title}">
                        <div class="p-3 p-md-4 w-100 d-flex flex-column justify-content-between">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="fw-bold mb-1"><a href="product.html?id=${item.product_id}" class="text-dark text-decoration-none">${item.title}</a></h5>
                                    <span class="text-success small fw-medium"><i class="bi bi-cloud-check me-1"></i> Saves ${itemCo2}kg CO₂</span>
                                </div>
                                <h5 class="fw-bold text-dark mb-0">$${item.price.toFixed(2)}</h5>
                            </div>
                            <div class="text-end mt-3 mt-md-0">
                                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="removeFromCart(${item.cart_item_id})">
                                    <i class="bi bi-trash"></i> Remove
                                </button>
                            </div>
                        </div>
                    </div>
                `}).join('');

                document.getElementById('itemCount').textContent = data.results.length;
                document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
                document.getElementById('total').textContent = `$${subtotal.toFixed(2)}`;
                document.getElementById('co2Total').textContent = `${co2Total} kg CO₂`;

            } catch (error) {
                showToast('Error loading cart', 'error');
                document.getElementById('loadingCart').classList.add('d-none');
            }
        }

        async function removeFromCart(cartItemId) {
            try {
                await apiCall(`/cart/${cartItemId}`, { method: 'DELETE' });
                document.getElementById(`item-${cartItemId}`).remove();
                showToast('Item removed', 'success');
                loadCart(); // Refresh totals
                updateCartBadge();
            } catch (error) {
                showToast('Error removing item', 'error');
            }
        }

        async function proceedToCheckout() {
            const btn = document.getElementById('btnCheckout');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Processing securely...';

            try {
                // Mock delay for UI Wow factor
                await new Promise(r => setTimeout(r, 1500));
                
                const res = await apiCall('/orders/checkout', { method: 'POST' });
                showToast(res.message, 'success');
                
                setTimeout(() => {
                    window.location.href = 'purchases.html';
                }, 1500);

            } catch (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Secure Checkout <i class="bi bi-lock-fill ms-1"></i>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializePage();
            loadCart();
        });
    </script>
</body>
</html>
