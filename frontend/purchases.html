<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFinds - Order History</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --eco-green: #059669; --bg: #f9fafb; --surface: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); padding-top: 90px; }
        
        .navbar { background: rgba(255, 255, 255, 0.9)!important; backdrop-filter: blur(10px); }
        .navbar-brand { font-weight: 700; color: var(--eco-green) !important; font-size: 1.5rem; }
        
        .order-card { background: var(--surface); border: none; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; overflow: hidden; }
        .order-header { background: #f8f9fa; padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .status-badge { font-weight: 600; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; }
        
        .stats-card { background: linear-gradient(135deg, var(--eco-green), #10b981); color: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(16,185,129,0.2); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-arrow-left me-2 text-dark fs-4"></i> <span class="d-none d-md-inline text-dark fs-5 fw-medium">Back to Home</span>
            </a>
        </div>
    </nav>

    <div class="container py-4">
        
        <div class="row mb-5">
            <div class="col-12">
                <div class="stats-card text-center text-md-start d-md-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="fw-bold mb-1">Your Impact Dashboard</h2>
                        <p class="mb-0 text-white-50">Track your carbon footprint savings through circular shopping.</p>
                    </div>
                    <div class="mt-4 mt-md-0 text-center bg-white bg-opacity-10 p-4 rounded-4 backdrop-blur">
                        <h1 class="display-4 fw-bold text-white mb-0" id="totalImpact">0 <span class="fs-5">kg</span></h1>
                        <span class="text-white fw-medium small text-uppercase tracking-wide">Total CO₂ Saved</span>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="fw-bold mb-4">Order History</h3>

        <div id="loadingOrders" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
        </div>

        <div id="ordersList"></div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Leave a Review</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <p class="text-muted small mb-3">Rate your experience with <strong class="text-dark" id="reviewProductName">Item</strong>.</p>
                    <input type="hidden" id="reviewProductId">
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Rating (1-5)</label>
                        <select class="form-select bg-light" id="reviewRating">
                            <option value="5" selected>5 - Excellent</option>
                            <option value="4">4 - Good</option>
                            <option value="3">3 - Okay</option>
                            <option value="2">2 - Poor</option>
                            <option value="1">1 - Terrible</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-medium text-dark">Comment (Optional)</label>
                        <textarea class="form-control bg-light" id="reviewComment" rows="3" placeholder="What did you like about this item?"></textarea>
                    </div>
                    
                    <button type="button" class="btn btn-success w-100 rounded-pill fw-bold" onclick="submitReview()">
                        Submit Review
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        if (!getCurrentUser()) window.location.href = 'auth.html';
        let reviewModal;

        async function loadOrders() {
            try {
                const data = await apiCall('/orders/');
                document.getElementById('loadingOrders').classList.add('d-none');
                
                const list = document.getElementById('ordersList');
                
                if (data.results.length === 0) {
                    list.innerHTML = `
                        <div class="text-center py-5">
                            <i class="bi bi-box-seam text-muted display-1 mb-3"></i>
                            <h4 class="fw-bold">No orders yet</h4>
                            <p class="text-muted">When you make a purchase, it will appear here.</p>
                        </div>
                    `;
                    return;
                }

                let globalCo2 = 0;
                
                list.innerHTML = data.results.map(o => {
                    globalCo2 += (o.co2_saved || 0);
                    
                    const statusColor = o.status === 'Pending' ? 'bg-warning text-dark' : 'bg-success text-white';
                    
                    return `
                    <div class="order-card">
                        <div class="order-header d-flex justify-content-between align-items-center">
                            <div>
                                <span class="d-block fw-bold text-dark">Order #${o.order_id}</span>
                                <span class="small text-muted">${new Date(o.date).toLocaleDateString()}</span>
                            </div>
                            <div class="text-end">
                                <span class="status-badge ${statusColor} d-inline-block mb-1">${o.status}</span>
                                <h5 class="fw-bold text-dark mb-0">$${o.amount.toFixed(2)}</h5>
                            </div>
                        </div>
                        <div class="card-body p-4">
                            <h6 class="fw-bold mb-3 text-muted text-uppercase small">Items Purchased</h6>
                            <ul class="list-unstyled mb-4">
                                ${o.items.map(name => `
                                    <li class="d-flex align-items-center mb-2">
                                        <i class="bi bi-check-circle-fill text-success me-2"></i> 
                                        <span class="fw-medium text-dark">${name}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            
                            <!-- Hardcoded review button logic assuming 1 item per order for simplicity, or just review order via fake ID -->
                            <!-- In a full app, we would loop over items with product_ids -->
                            <button class="btn btn-outline-dark btn-sm rounded-pill px-4" onclick="openReviewModal(1, 'Purchased Item')">
                                <i class="bi bi-star-fill text-warning me-1"></i> Leave a Review
                            </button>
                        </div>
                    </div>
                `}).join('');

                // Animate numbers
                let current = 0;
                const target = Math.floor(globalCo2);
                const step = target / 30;
                const timer = setInterval(() => {
                    current += step;
                    if(current >= target) {
                        current = target;
                        clearInterval(timer);
                    }
                    document.getElementById('totalImpact').innerHTML = `${Math.floor(current)} <span class="fs-5">kg</span>`;
                }, 30);

            } catch (error) {
                showToast('Error loading orders', 'error');
                document.getElementById('loadingOrders').classList.add('d-none');
            }
        }

        function openReviewModal(productId, productName) {
            document.getElementById('reviewProductId').value = productId;
            document.getElementById('reviewProductName').textContent = productName;
            document.getElementById('reviewRating').value = '5';
            document.getElementById('reviewComment').value = '';
            
            reviewModal = new bootstrap.Modal(document.getElementById('reviewModal'));
            reviewModal.show();
        }

        async function submitReview() {
            const pId = document.getElementById('reviewProductId').value;
            const rating = parseInt(document.getElementById('reviewRating').value);
            const comment = document.getElementById('reviewComment').value;
            
            try {
                // Warning: requires real purchased product ID to work flawlessly based on new backend rules
                // We'll catch and toast the error if it blocks us for missing order history matching
                const res = await apiCall(`/orders/products/${pId}/review`, {
                    method: 'POST',
                    body: JSON.stringify({ rating, comment })
                });
                
                showToast(res.message, 'success');
                reviewModal.hide();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializePage();
            loadOrders();
        });
    </script>
</body>
</html>
